<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prototyp B — Handwerk Hell (archiviert)</title>
    <style>
      :root { --ink:#1a1d21; --muted:#5a616a; --accent:#b23a22; --surface:#f6f2ea; --border:#e4ddd0;
        --display:"Arial Narrow",system-ui,sans-serif; --body:system-ui,-apple-system,"Segoe UI",sans-serif; }
      * { box-sizing:border-box; margin:0; padding:0; }
      body { font-family:var(--body); color:var(--ink); background:var(--surface); line-height:1.6; }
      .wrap { max-width:1180px; margin:0 auto; padding:0 2rem; }
      header { border-bottom:1px solid var(--border); }
      .nav { display:flex; align-items:center; justify-content:space-between; height:72px; font-family:var(--display); font-weight:700; }
      .nav nav a { margin-left:20px; color:var(--muted); text-decoration:none; }
      .hero { display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:center; padding:80px 0; }
      .eyebrow { color:var(--accent); font-family:var(--display); font-weight:700; text-transform:uppercase; letter-spacing:.14em; font-size:.8rem; }
      h1 { font-family:var(--display); font-weight:800; font-size:3.6rem; line-height:1.02; margin:16px 0; letter-spacing:-.02em; }
      .sub { color:var(--muted); font-size:1.1rem; max-width:34rem; }
      .cta { display:flex; gap:14px; align-items:center; margin-top:28px; }
      .btn { font-family:var(--display); font-weight:700; padding:13px 22px; border-radius:4px; text-decoration:none; }
      .btn-p { background:var(--accent); color:#fff; }
      .link { color:var(--ink); font-family:var(--display); font-weight:700; text-decoration:none; }
      .photo { aspect-ratio:4/3; border-radius:8px; overflow:hidden; box-shadow:0 30px 60px -30px rgba(0,0,0,.35); }
      .photo svg { width:100%; height:100%; }
      .trust { display:flex; gap:20px; margin-top:26px; color:var(--muted); font-size:.95rem; }
      @media (max-width:860px){ .hero{ grid-template-columns:1fr; padding:48px 0;} h1{font-size:2.6rem;} }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap nav"><div>Herrmann <span style="color:var(--accent)">Dachdecker</span></div>
        <nav><a>Leistungen</a><a>Über uns</a><a>Projekte</a><a>Kontakt</a></nav></div>
    </header>
    <section>
      <div class="wrap hero">
        <div>
          <p class="eyebrow">Meisterbetrieb · Rackwitz &amp; Leipzig</p>
          <h1>Ihr Dach in Meisterhand</h1>
          <p class="sub">Dachdecker-, Schiefer- und Sanierungsarbeiten im Raum Rackwitz und Leipzig — freundlich beraten, sauber ausgeführt.</p>
          <div class="cta"><a class="btn btn-p" href="#">Anfrage senden</a><a class="link" href="#">Anrufen →</a></div>
          <div class="trust"><span>✓ Meisterbetrieb</span><span>✓ Termintreu</span><span>✓ Regional</span></div>
        </div>
        <div class="photo">
          <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            <rect width="800" height="600" fill="#e9e2d6" />
            <polygon points="0,380 380,220 380,600 0,600" fill="#3a4149" />
            <polygon points="380,220 800,380 800,600 380,600" fill="#4a525b" />
            <circle cx="650" cy="130" r="70" fill="#d9694b" fill-opacity=".3" />
          </svg>
        </div>
      </div>
    </section>
  </body>
</html>
